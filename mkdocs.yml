site_name: BUSCOlite
site_description: Simplified BUSCO analysis for gene prediction
site_author: Jon Palmer
site_url: https://nextgenusfs.github.io/buscolite/

repo_name: nextgenusfs/buscolite
repo_url: https://github.com/nextgenusfs/buscolite
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Usage Guide: usage.md
  - API Reference:
      - Overview: api/overview.md
      - busco: api/busco.md
      - search: api/search.md
      - gff: api/gff.md
      - utilities: api/utilities.md
      - fastx: api/fastx.md
      - augustus: api/augustus.md
      - log: api/log.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nextgenusfs/buscolite
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/buscolite/

copyright: Copyright &copy; 2022-2026 Jon Palmer

